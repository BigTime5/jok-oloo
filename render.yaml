# Render Blueprint — Jok Oloo Clan Management App
# https://render.com/docs/blueprint-spec

databases:
  - name: jok-oloo-db
    plan: free
    databaseName: jok_oloo
    user: jok_oloo_user

services:
  # ── Backend API ──
  - type: web
    name: jok-oloo-api
    runtime: node
    plan: free
    rootDir: Clan Management App/server
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: jok-oloo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false        # You set this manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false        # You set this manually in Render dashboard
      - key: FRONTEND_URL
        value: https://jok-oloo.onrender.com
      - key: GROUP_START_MONTH
        value: "May 2026"
      - key: REGISTRATION_FEE
        value: "50"
      - key: MONTHLY_CONTRIBUTION
        value: "100"
      - key: TREASURER_NAME
        value: "Susan"
      - key: TREASURER_PHONE
        value: "0729207208"

  # ── Frontend Static Site ──
  - type: web
    name: jok-oloo
    runtime: static
    rootDir: Clan Management App/app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://jok-oloo-api.onrender.com
